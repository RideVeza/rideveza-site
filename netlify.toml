# Netlify build config for the static Astro site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Old Framer URL. Kept here (not as an Astro redirect) so no stub file
# case-collides with /privacy-policy/ on Netlify.
[[redirects]]
  from = "/Privacy-Policy"
  to = "/privacy-policy"
  status = 301
